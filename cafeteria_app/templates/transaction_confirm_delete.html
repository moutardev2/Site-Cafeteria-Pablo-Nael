{% extends 'base.html' %}

{% block title %}Supprimer transaction{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card page-card border-danger">
            <div class="card-body p-4">
                <h1 class="h4 text-danger mb-3">Supprimer la transaction</h1>
                <p class="mb-4">Confirmer la suppression de la transaction de <strong>{{ transaction.amount }} €</strong> ?</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Supprimer</button>
                        <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
